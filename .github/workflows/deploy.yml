name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Scan Container Image"]
    branches: [main]
    types: 
      - completed
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment (bypasses some checks)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deployment-security-gates:
    name: 🔐 Deployment Security Gates
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.final-decision.outputs.can-deploy }}
    
    steps:
    - name: 📋 Initialize Deployment Gate Check
      run: |
        echo "## 🔐 Deployment Security Gates Verification" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Verifying all security requirements before production deployment..." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: 🚦 GATE 1: Workflow Trigger Validation
      id: trigger-check
      run: |
        echo "### 🚦 Gate 1: Workflow Trigger Validation" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
          if [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "✅ TRIGGER GATE PASSED - Image build workflow completed successfully"
            echo "- ✅ Image build workflow completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "trigger-valid=true" >> $GITHUB_OUTPUT
          else
            echo "❌ TRIGGER GATE FAILED - Image build workflow failed"
            echo "- ❌ Image build workflow failed or was cancelled" >> $GITHUB_STEP_SUMMARY
            echo "trigger-valid=false" >> $GITHUB_OUTPUT
          fi
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          if [[ "${{ github.event.inputs.force_deploy }}" == "true" ]]; then
            echo "⚠️ TRIGGER GATE BYPASSED - Force deployment requested"
            echo "- ⚠️ Force deployment bypassing normal checks" >> $GITHUB_STEP_SUMMARY
            echo "trigger-valid=bypass" >> $GITHUB_OUTPUT
          else
            echo "❌ TRIGGER GATE FAILED - Manual deployment requires force flag"
            echo "- ❌ Manual deployment requires force flag" >> $GITHUB_STEP_SUMMARY
            echo "trigger-valid=false" >> $GITHUB_OUTPUT
          fi
        fi

    - name: 🔍 GATE 2: Code Security Validation
      id: code-check
      run: |
        echo "### 🔍 Gate 2: Code Security Validation" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ steps.trigger-check.outputs.trigger-valid }}" == "true" ]]; then
          echo "✅ CODE SECURITY GATE PASSED - SAST scanning completed successfully"
          echo "- ✅ SAST scanning found no critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code meets security standards for production" >> $GITHUB_STEP_SUMMARY
          echo "code-secure=true" >> $GITHUB_OUTPUT
        else
          echo "❌ CODE SECURITY GATE FAILED - Upstream validation required"
          echo "- ❌ Code security validation cannot be confirmed" >> $GITHUB_STEP_SUMMARY
          echo "code-secure=false" >> $GITHUB_OUTPUT
        fi

    - name: 🐳 GATE 3: Container Security Validation  
      id: container-check
      run: |
        echo "### 🐳 Gate 3: Container Security Validation" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ steps.trigger-check.outputs.trigger-valid }}" == "true" ]]; then
          echo "✅ CONTAINER SECURITY GATE PASSED - Image scanning completed successfully"
          echo "- ✅ Container image scanning found no critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Image meets security standards for production" >> $GITHUB_STEP_SUMMARY
          echo "container-secure=true" >> $GITHUB_OUTPUT
        else
          echo "❌ CONTAINER SECURITY GATE FAILED - Upstream validation required"
          echo "- ❌ Container security validation cannot be confirmed" >> $GITHUB_STEP_SUMMARY
          echo "container-secure=false" >> $GITHUB_OUTPUT
        fi

    - name: 🛡️ FINAL DEPLOYMENT DECISION
      id: final-decision
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🛡️ Final Deployment Decision" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        trigger_valid="${{ steps.trigger-check.outputs.trigger-valid }}"
        code_secure="${{ steps.code-check.outputs.code-secure }}"
        container_secure="${{ steps.container-check.outputs.container-secure }}"
        
        if [[ "$trigger_valid" == "true" && "$code_secure" == "true" && "$container_secure" == "true" ]] || [[ "$trigger_valid" == "bypass" ]]; then
          echo "✅ ALL SECURITY GATES PASSED - DEPLOYMENT AUTHORIZED"
          echo "can-deploy=true" >> $GITHUB_OUTPUT
          
          echo "### 🟢 DEPLOYMENT AUTHORIZED ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**All Security Requirements Satisfied:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Workflow trigger validation passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code security scanning passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container security scanning passed" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 **Ready for production deployment**" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ SECURITY GATES FAILED - DEPLOYMENT BLOCKED"
          echo "can-deploy=false" >> $GITHUB_OUTPUT
          
          echo "### 🔴 DEPLOYMENT BLOCKED ❌" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Requirements Not Met:**" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$trigger_valid" != "true" && "$trigger_valid" != "bypass" ]]; then
            echo "- ❌ Workflow trigger validation failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "$code_secure" != "true" ]]; then
            echo "- ❌ Code security requirements not satisfied" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "$container_secure" != "true" ]]; then
            echo "- ❌ Container security requirements not satisfied" >> $GITHUB_STEP_SUMMARY
          fi
          
          exit 1
        fi

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: deployment-security-gates
    if: needs.deployment-security-gates.outputs.can-deploy == 'true'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
    - name: 🔒 Final Pre-Deployment Security Check
      run: |
        echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔒 Pre-Deployment Security Verification" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ All security gates verified and passed" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Code scanning: No critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Container scanning: Image security validated" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Deployment authorized by security framework" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: 🐳 Deploy Secure Container
      id: deploy
      run: |
        echo "🚀 Deploying security-approved container to production..."
        echo "📦 Using container image that passed all security gates"
        echo "🔧 Applying production configuration..."
        echo "🌐 Updating load balancer..."
        
        # Simulate production deployment
        sleep 3
        
        echo "✅ Production deployment completed successfully!"
        echo "url=https://actions-gate-demo.com" >> $GITHUB_OUTPUT
        
        echo "### 🎉 Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "- 🌍 **Application URL:** https://actions-gate-demo.com" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Security-validated container deployed" >> $GITHUB_STEP_SUMMARY
        echo "- 🔒 All security gates satisfied" >> $GITHUB_STEP_SUMMARY

    - name: 🔍 Post-Deployment Security Validation
      run: |
        echo "🔍 Running post-deployment security validation..."
        echo "  ✅ Application health check: PASS"
        echo "  ✅ Security headers validation: PASS"
        echo "  ✅ SSL certificate check: PASS"
        echo "  ✅ Performance baseline: PASS"
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔍 Post-Deployment Validation" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Application health check: PASS" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Security headers validation: PASS" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ SSL certificate check: PASS" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Performance baseline: PASS" >> $GITHUB_STEP_SUMMARY

  notify-deployment:
    name: 📢 Deployment Notification
    runs-on: ubuntu-latest
    needs: [deployment-security-gates, deploy-production]
    if: always() && needs.deployment-security-gates.outputs.can-deploy == 'true'
    
    steps:
    - name: 📢 Create Deployment Notification
      uses: actions/github-script@v7
      with:
        script: |
          const success = '${{ needs.deploy-production.result }}' === 'success';
          const emoji = success ? '🎉' : '❌';
          const status = success ? 'SUCCESS' : 'FAILED';
          
          const body = `
          ## ${emoji} Production Deployment ${status}
          
          **🔐 Security Gates Status:**
          - ✅ **Code Scanning Gate:** PASSED - No critical vulnerabilities
          - ✅ **Container Scanning Gate:** PASSED - Image security validated  
          - ✅ **Deployment Gate:** PASSED - All requirements satisfied
          
          **📊 Deployment Details:**
          - **Environment:** Production
          - **Triggered by:** ${{ github.event_name }}
          - **Commit:** ${{ github.sha }}
          - **Actor:** ${{ github.actor }}
          
          ${success ? 
            '🌍 **Application URL:** https://actions-gate-demo.com\n\n🔒 **Security Framework:** All gates passed - deployment is secure and authorized!' : 
            '❌ **Status:** Deployment failed - check workflow logs for details'}
          `;
          
          // Create a comment on the commit
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: body
          });