name: Build and Scan Container Image

on:
  workflow_run:
    workflows: ["CI - Code Scanning and Tests"]
    branches: [main]
    types: 
      - completed
  push:
    branches: [main]
    paths: 
      - 'Dockerfile'
      - 'package*.json'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Only run if CI passed or if manually triggered
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    
    steps:
    - name: Check CI workflow status
      id: check
      run: |
        echo "## 🔍 CI Status Check" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
          if [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "✅ CI passed, proceeding with image build"
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "- ✅ CI workflow completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "- 🚀 Proceeding with image build" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ CI failed, skipping image build"
            echo "should-build=false" >> $GITHUB_OUTPUT
            echo "- ❌ CI workflow failed or was cancelled" >> $GITHUB_STEP_SUMMARY
            echo "- 🛑 Image build blocked by failed CI gate" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        else
          echo "📝 Manual trigger or Dockerfile change, proceeding with build"
          echo "should-build=true" >> $GITHUB_OUTPUT
          echo "- 📝 Manual trigger or Dockerfile change detected" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Proceeding with image build" >> $GITHUB_STEP_SUMMARY
        fi

  build-image:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should-build == 'true'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build container image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/image.tar

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: container-image
        path: /tmp/image.tar
        retention-days: 1

  scan-image:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-image
    outputs:
      scan-status: ${{ steps.scan.outputs.scan-status }}
      issues-count: ${{ steps.scan.outputs.issues-count }}
      critical-issues: ${{ steps.scan.outputs.critical-issues }}
      high-issues: ${{ steps.scan.outputs.high-issues }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'

    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: container-image
        path: /tmp

    - name: Load Docker image
      run: docker load --input /tmp/image.tar

    - name: Run Container Image Scan
      id: scan
      run: |
        echo "## 🐳 Container Image Scan" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Running container security scan..." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        node scripts/image-scan.js ./Dockerfile image-scan-results.json

    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: image-scan-results
        path: image-scan-results.json

    - name: Display scan summary
      if: always()
      run: |
        echo "Container Image Scan Summary:"
        if [ -f "image-scan-results.json" ]; then
          cat image-scan-results.json | jq -r '
            "Status: " + .status,
            "Total Issues: " + (.summary.total | tostring),
            "  Critical: " + (.summary.critical | tostring),
            "  High: " + (.summary.high | tostring),
            "  Medium: " + (.summary.medium | tostring),
            "  Low: " + (.summary.low | tostring)
          '
        fi

  # Critical vulnerabilities security gate
  critical-vulnerabilities-gate:
    name: 🔴 Critical Vulnerabilities Gate
    runs-on: ubuntu-latest
    needs: [scan-image]
    if: always()
    outputs:
      gate-passed: ${{ steps.gate.outputs.gate-passed }}
    
    steps:
    - name: Download scan results
      if: needs.scan-image.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: image-scan-results

    - name: Evaluate Critical Vulnerabilities Gate
      id: gate
      run: |
        scan_result="${{ needs.scan-image.result }}"
        critical_count="${{ needs.scan-image.outputs.critical-issues }}"

        echo "## 🔴 Critical Vulnerabilities Gate" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Critical Vulnerability Assessment" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Count | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Scan Job | ${scan_result} | success | $([[ "$scan_result" == "success" ]] && echo '✅ PASS' || echo '❌ FAIL') |" >> $GITHUB_STEP_SUMMARY
        echo "| Critical Issues | ${critical_count:-n/a} | 0 | $([[ "$critical_count" == "0" ]] && echo '✅ PASS' || echo '❌ FAIL') |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [[ "$scan_result" != "success" ]]; then
          echo "❌ CRITICAL VULNERABILITIES GATE FAILED"
          echo "Container scan job did not complete successfully"
          echo "gate-passed=false" >> $GITHUB_OUTPUT

          echo "### 🔴 CRITICAL VULNERABILITIES GATE: FAILED ❌" >> $GITHUB_STEP_SUMMARY
          echo "- 🛑 Container scan did not complete successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 **Action Required:** Fix the image scan job before proceeding" >> $GITHUB_STEP_SUMMARY

          exit 1
        elif [[ "$critical_count" == "0" ]]; then
          echo "✅ CRITICAL VULNERABILITIES GATE PASSED"
          echo "No critical security vulnerabilities detected in container image"
          echo "gate-passed=true" >> $GITHUB_OUTPUT
          
          echo "### 🟢 CRITICAL VULNERABILITIES GATE: PASSED ✅" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No critical security vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container meets critical security requirements" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ CRITICAL VULNERABILITIES GATE FAILED"
          echo "Found $critical_count critical security vulnerabilities - immediate attention required"
          echo "gate-passed=false" >> $GITHUB_OUTPUT
          
          echo "### 🔴 CRITICAL VULNERABILITIES GATE: FAILED ❌" >> $GITHUB_STEP_SUMMARY
          echo "- 🚨 $critical_count critical vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          echo "- 🛑 Container deployment blocked" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 **Action Required:** Resolve all critical vulnerabilities immediately" >> $GITHUB_STEP_SUMMARY
          
          exit 1
        fi

  # High severity issues security gate  
  high-severity-gate:
    name: 🟠 High Severity Gate
    runs-on: ubuntu-latest
    needs: [scan-image]
    if: always()
    outputs:
      gate-passed: ${{ steps.gate.outputs.gate-passed }}
    
    steps:
    - name: Download scan results
      if: needs.scan-image.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: image-scan-results

    - name: Evaluate High Severity Gate
      id: gate
      run: |
        scan_result="${{ needs.scan-image.result }}"
        high_count="${{ needs.scan-image.outputs.high-issues }}"

        echo "## 🟠 High Severity Issues Gate" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### High Severity Assessment" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Count | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Scan Job | ${scan_result} | success | $([[ "$scan_result" == "success" ]] && echo '✅ PASS' || echo '❌ FAIL') |" >> $GITHUB_STEP_SUMMARY
        echo "| High Issues | ${high_count:-n/a} | ≤ 5 | $([[ -n "$high_count" && "$high_count" -le 5 ]] && echo '✅ PASS' || echo '❌ FAIL') |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [[ "$scan_result" != "success" ]]; then
          echo "❌ HIGH SEVERITY GATE FAILED"
          echo "Container scan job did not complete successfully"
          echo "gate-passed=false" >> $GITHUB_OUTPUT

          echo "### 🔴 HIGH SEVERITY GATE: FAILED ❌" >> $GITHUB_STEP_SUMMARY
          echo "- 🛑 Container scan did not complete successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 **Action Required:** Fix the image scan job before proceeding" >> $GITHUB_STEP_SUMMARY

          exit 1
        elif [[ "$high_count" -le "5" ]]; then
          echo "✅ HIGH SEVERITY GATE PASSED"
          echo "High severity issues: $high_count (within acceptable threshold of 5)"
          echo "gate-passed=true" >> $GITHUB_OUTPUT
          
          echo "### 🟢 HIGH SEVERITY GATE: PASSED ✅" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ High severity issues within acceptable threshold" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 $high_count issues found (≤ 5 allowed)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container meets security standards" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ HIGH SEVERITY GATE FAILED"
          echo "High severity issues: $high_count (exceeds acceptable threshold of 5)"
          echo "gate-passed=false" >> $GITHUB_OUTPUT
          
          echo "### 🔴 HIGH SEVERITY GATE: FAILED ❌" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ $high_count high-severity issues exceed threshold" >> $GITHUB_STEP_SUMMARY
          echo "- 📏 Threshold: 5 issues maximum" >> $GITHUB_STEP_SUMMARY
          echo "- 🛑 Container deployment blocked" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 **Action Required:** Reduce high-severity issues to ≤ 5" >> $GITHUB_STEP_SUMMARY
          
          exit 1
        fi

  # Overall image security gate
  image-security-gate:
    name: 🛡️ Image Security Gate
    runs-on: ubuntu-latest
    needs: [critical-vulnerabilities-gate, high-severity-gate, scan-image]
    if: always()
    outputs:
      gate-passed: ${{ steps.gate.outputs.gate-passed }}
    
    steps:
    - name: Final Image Security Decision
      id: gate
      run: |
        critical_gate_result="${{ needs.critical-vulnerabilities-gate.result }}"
        critical_gate_passed="${{ needs.critical-vulnerabilities-gate.outputs.gate-passed }}"
        high_gate_result="${{ needs.high-severity-gate.result }}"
        high_gate_passed="${{ needs.high-severity-gate.outputs.gate-passed }}"

        echo "## 🛡️ Overall Image Security Gate" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Security Gate Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Gate | Status | Result |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Critical Vulnerabilities | ${critical_gate_result} | ${critical_gate_passed:-false} |" >> $GITHUB_STEP_SUMMARY
        echo "| High Severity Issues | ${high_gate_result} | ${high_gate_passed:-false} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "$critical_gate_passed" == "true" && "$high_gate_passed" == "true" ]]; then
          echo "✅ ALL IMAGE SECURITY GATES PASSED"
          echo "🐳 Container image meets security standards - PUSH AUTHORIZED"
          echo "gate-passed=true" >> $GITHUB_OUTPUT
          
          echo "### 🟢 IMAGE SECURITY: AUTHORIZED ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🎉 Container Security Validated:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No critical vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ High-severity issues within acceptable limits" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container ready for production deployment" >> $GITHUB_STEP_SUMMARY
          echo "- 🐳 **Push to registry authorized**" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ IMAGE SECURITY GATES FAILED"
          echo "🛑 Image security requirements not met - PUSH BLOCKED"
          echo "gate-passed=false" >> $GITHUB_OUTPUT
          
          echo "### 🔴 IMAGE SECURITY: BLOCKED ❌" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🛑 Security Requirements Not Met:**" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.critical-vulnerabilities-gate.outputs.gate-passed }}" != "true" ]]; then
            echo "- ❌ Critical vulnerabilities gate failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ needs.high-severity-gate.outputs.gate-passed }}" != "true" ]]; then
            echo "- ❌ High severity issues gate failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- 📋 **Action Required:** Address all failing gates before deployment" >> $GITHUB_STEP_SUMMARY
          
          exit 1
        fi

  push-image:
    name: 📦 Push Secure Image
    runs-on: ubuntu-latest
    needs: [build-image, image-security-gate]
    if: needs.image-security-gate.outputs.gate-passed == 'true'
    
    steps:
    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: container-image
        path: /tmp

    - name: Simulate Docker Image Push
      run: |
        echo "## 📦 Push Secure Container Image" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        docker load --input /tmp/image.tar
        echo "🔍 Image loaded successfully: ${{ needs.build-image.outputs.image-tag }}"
        echo "📦 Simulating push to registry (demo mode - no actual push to avoid permissions issue)"
        echo "✅ Container image validation complete"
        
        echo "### 🎉 Image Push Simulation Successful" >> $GITHUB_STEP_SUMMARY
        echo "- 📦 **Container image loaded and validated**" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Image passed all security gates**" >> $GITHUB_STEP_SUMMARY
        echo "- 🔍 **Would be pushed to:** ${{ needs.build-image.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- 🛡️ **Security validated and deployment ready**" >> $GITHUB_STEP_SUMMARY
        echo "- ⚠️ **Note:** Actual registry push disabled for demo to avoid token permissions" >> $GITHUB_STEP_SUMMARY
