name: Build and Scan Container Image

on:
  workflow_run:
    workflows: ["CI - Code Scanning and Tests"]
    branches: [main]
    types: 
      - completed
  push:
    branches: [main]
    paths: 
      - 'Dockerfile'
      - 'package*.json'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Only run if CI passed or if manually triggered
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    
    steps:
    - name: Check CI workflow status
      id: check
      run: |
        if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
          if [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "CI passed, proceeding with image build"
            echo "should-build=true" >> $GITHUB_OUTPUT
          else
            echo "CI failed, skipping image build"
            echo "should-build=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "Manual trigger or Dockerfile change, proceeding with build"
          echo "should-build=true" >> $GITHUB_OUTPUT
        fi

  build-image:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should-build == 'true'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build container image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/image.tar

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: container-image
        path: /tmp/image.tar
        retention-days: 1

  scan-image:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-image
    outputs:
      scan-status: ${{ steps.scan.outputs.scan-status }}
      issues-count: ${{ steps.scan.outputs.issues-count }}
      critical-issues: ${{ steps.scan.outputs.critical-issues }}
      high-issues: ${{ steps.scan.outputs.high-issues }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: container-image
        path: /tmp

    - name: Load Docker image
      run: docker load --input /tmp/image.tar

    - name: Run Container Image Scan
      id: scan
      run: |
        echo "Running container security scan..."
        node scripts/image-scan.js ./Dockerfile image-scan-results.json

    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: image-scan-results
        path: image-scan-results.json

    - name: Display scan summary
      if: always()
      run: |
        echo "Container Image Scan Summary:"
        if [ -f "image-scan-results.json" ]; then
          cat image-scan-results.json | jq -r '
            "Status: " + .status,
            "Total Issues: " + (.summary.total | tostring),
            "  Critical: " + (.summary.critical | tostring),
            "  High: " + (.summary.high | tostring),
            "  Medium: " + (.summary.medium | tostring),
            "  Low: " + (.summary.low | tostring)
          '
        fi

  image-security-gate:
    name: 🐳 Image Security Gate Evaluation
    runs-on: ubuntu-latest
    needs: [build-image, scan-image]
    outputs:
      gate-passed: ${{ steps.gate.outputs.gate-passed }}
    
    steps:
    - name: 📋 Gather Image Security Inputs
      run: |
        echo "## 🐳 Container Image Security Gate" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Image Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Overall Scan | ${{ needs.scan-image.outputs.scan-status }} | - |" >> $GITHUB_STEP_SUMMARY
        echo "| Critical Issues | 🔴 | ${{ needs.scan-image.outputs.critical-issues }} |" >> $GITHUB_STEP_SUMMARY
        echo "| High Issues | 🟠 | ${{ needs.scan-image.outputs.high-issues }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Total Issues | 📊 | ${{ needs.scan-image.outputs.issues-count }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: 🔍 SECURITY GATE: Critical Vulnerabilities Check
      run: |
        critical_count=${{ needs.scan-image.outputs.critical-issues }}
        if [[ "$critical_count" == "0" ]]; then
          echo "✅ CRITICAL VULNERABILITIES CHECK PASSED - No critical issues found"
          echo "### ✅ Critical Vulnerabilities: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "No critical security vulnerabilities detected in container image" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ CRITICAL VULNERABILITIES CHECK FAILED - $critical_count critical issues found"
          echo "### ❌ Critical Vulnerabilities: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "Found $critical_count critical security vulnerabilities - immediate attention required" >> $GITHUB_STEP_SUMMARY
        fi

    - name: 🔍 SECURITY GATE: High Severity Issues Check
      run: |
        high_count=${{ needs.scan-image.outputs.high-issues }}
        if [[ "$high_count" -le "5" ]]; then
          echo "✅ HIGH SEVERITY CHECK PASSED - $high_count high issues (within threshold)"
          echo "### ✅ High Severity Issues: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "High severity issues: $high_count (within acceptable threshold of 5)" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ HIGH SEVERITY CHECK FAILED - $high_count high issues (exceeds threshold of 5)"
          echo "### ❌ High Severity Issues: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "High severity issues: $high_count (exceeds acceptable threshold of 5)" >> $GITHUB_STEP_SUMMARY
        fi

    - name: 🛡️ OVERALL IMAGE SECURITY GATE DECISION
      id: gate
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🛡️ Final Image Security Decision" >> $GITHUB_STEP_SUMMARY
        
        # Gate logic: No critical issues and limited high severity issues
        if [[ "${{ needs.scan-image.outputs.scan-status }}" == "PASS" ]]; then
          echo "✅ OVERALL IMAGE SECURITY GATE: PASSED"
          echo "🐳 Container image meets security standards - PUSH AUTHORIZED"
          echo "gate-passed=true" >> $GITHUB_OUTPUT
          
          echo "### 🟢 IMAGE SECURITY GATE: PASSED ✅" >> $GITHUB_STEP_SUMMARY
          echo "🐳 **CONTAINER PUSH AUTHORIZED**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Standards Met:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ High-severity issues within acceptable limits" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container ready for production deployment" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ OVERALL IMAGE SECURITY GATE: FAILED"
          echo "🛑 Image security requirements not met - PUSH BLOCKED"
          echo "gate-passed=false" >> $GITHUB_OUTPUT
          
          echo "### 🔴 IMAGE SECURITY GATE: FAILED ❌" >> $GITHUB_STEP_SUMMARY
          echo "🛑 **CONTAINER PUSH BLOCKED**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Issues:**" >> $GITHUB_STEP_SUMMARY
          
          critical_count=${{ needs.scan-image.outputs.critical-issues }}
          high_count=${{ needs.scan-image.outputs.high-issues }}
          
          if [[ "$critical_count" != "0" ]]; then
            echo "- 🚨 $critical_count critical vulnerabilities must be resolved" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "$high_count" -gt "5" ]]; then
            echo "- ⚠️ $high_count high-severity issues exceed threshold of 5" >> $GITHUB_STEP_SUMMARY
          fi
          
          exit 1
        fi

  push-image:
    name: Push Secure Image
    runs-on: ubuntu-latest
    needs: [build-image, image-security-gate]
    if: needs.image-security-gate.outputs.gate-passed == 'true'
    
    steps:
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: container-image
        path: /tmp

    - name: Load and push Docker image
      run: |
        docker load --input /tmp/image.tar
        echo "Pushing image(s): ${{ needs.build-image.outputs.image-tag }}"
        docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    - name: Image pushed successfully
      run: |
        echo "🎉 Container image successfully pushed to registry!"
        echo "✅ Image passed all security gates"
        echo "📦 Available at: ${{ needs.build-image.outputs.image-tag }}"