name: CI - Code Scanning and Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'

jobs:
  # First job: Run tests and basic checks
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    outputs:
      test-status: ${{ steps.tests.outcome }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Add supertest dependency for tests
      run: npm install --save-dev supertest

    - name: Run tests
      id: tests
      run: npm test

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: coverage/

  # Second job: SAST Code Scanning (runs in parallel with tests)
  code-scan:
    name: SAST Code Scanning
    runs-on: ubuntu-latest
    outputs:
      scan-status: ${{ steps.scan.outputs.scan-status }}
      issues-count: ${{ steps.scan.outputs.issues-count }}
      critical-issues: ${{ steps.scan.outputs.critical-issues }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Run SAST Code Scan
      id: scan
      run: |
        echo "## 🔍 SAST Code Scanning" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Running SAST security scan..." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        node scripts/code-scan.js . code-scan-results.json

    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-scan-results
        path: code-scan-results.json

    - name: Comment PR with scan results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const results = JSON.parse(fs.readFileSync('code-scan-results.json', 'utf8'));
            const status = results.status === 'PASS' ? '✅ PASS' : '❌ FAIL';
            const emoji = results.status === 'PASS' ? '🔒' : '🚨';
            
            const body = `
          ## ${emoji} SAST Code Scan Results
          
          **Status:** ${status}
          **Total Issues:** ${results.summary.total}
          - Critical: ${results.summary.critical}
          - High: ${results.summary.high}
          - Medium: ${results.summary.medium}
          
          ${results.findings.length > 0 ? 
            '### Issues Found:\n' + results.findings.map(f => 
              `- **[${f.severity}]** ${f.description}\n  - File: \`${f.file}\` (line ${f.line})\n  - Evidence: \`${f.evidence}\``
            ).join('\n') : '🎉 No security issues found!'}
          `;
          
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          } catch (error) {
            console.log('Could not read scan results:', error.message);
          }

  # Third job: Test Results Security Gate
  test-security-gate:
    name: 🚦 Test Security Gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    outputs:
      gate-passed: ${{ steps.gate.outputs.gate-passed }}
    
    steps:
    - name: Evaluate Test Security Gate
      id: gate
      run: |
        test_result="${{ needs.test.result }}"
        test_status="${{ needs.test.outputs.test-status }}"

        echo "## 🚦 Test Security Gate" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Gate Evaluation" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ${test_result} | Application functionality verification |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "$test_result" == "success" && "$test_status" == "success" ]]; then
          echo "✅ TEST SECURITY GATE PASSED"
          echo "All unit tests executed successfully - application functionality verified"
          echo "gate-passed=true" >> $GITHUB_OUTPUT
          
          echo "### 🟢 TEST GATE: PASSED ✅" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All unit tests executed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Application functionality verified" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Ready for further security validation" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ TEST SECURITY GATE FAILED"
          echo "Unit tests failed - blocking deployment pipeline"
          echo "gate-passed=false" >> $GITHUB_OUTPUT
          
          echo "### 🔴 TEST GATE: FAILED ❌" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Unit tests failed" >> $GITHUB_STEP_SUMMARY
          echo "- 🛑 Deployment pipeline blocked" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Fix failing tests before proceeding" >> $GITHUB_STEP_SUMMARY
          
          exit 1
        fi

  # Fourth job: Code Scanning Security Gate
  code-security-gate:
    name: 🔍 Code Security Gate
    runs-on: ubuntu-latest
    needs: [code-scan]
    if: always()
    outputs:
      gate-passed: ${{ steps.gate.outputs.gate-passed }}
    
    steps:
    - name: Download scan results
      if: needs.code-scan.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: code-scan-results

    - name: Evaluate Code Security Gate
      id: gate
      run: |
        scan_result="${{ needs.code-scan.result }}"
        scan_status="${{ needs.code-scan.outputs.scan-status }}"
        critical_issues="${{ needs.code-scan.outputs.critical-issues }}"
        total_issues="${{ needs.code-scan.outputs.issues-count }}"

        echo "## 🔍 Code Security Gate" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### SAST Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Scan Job | ${scan_result} | - |" >> $GITHUB_STEP_SUMMARY
        echo "| Overall Scan | ${scan_status:-UNAVAILABLE} | - |" >> $GITHUB_STEP_SUMMARY
        echo "| Critical Issues | 🔴 | ${critical_issues:-n/a} |" >> $GITHUB_STEP_SUMMARY
        echo "| Total Issues | 📊 | ${total_issues:-n/a} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "$scan_result" == "success" && "$scan_status" == "PASS" ]]; then
          echo "✅ CODE SECURITY GATE PASSED"
          echo "SAST scanning found no critical or high-severity security issues"
          echo "gate-passed=true" >> $GITHUB_OUTPUT
          
          echo "### 🟢 CODE SECURITY GATE: PASSED ✅" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No critical security vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code meets security standards" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Ready for image build and deployment" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ CODE SECURITY GATE FAILED"
          echo "SAST scanning found critical security issues - blocking deployment"
          echo "gate-passed=false" >> $GITHUB_OUTPUT
          
          echo "### 🔴 CODE SECURITY GATE: FAILED ❌" >> $GITHUB_STEP_SUMMARY
          echo "- 🚨 Critical security vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          echo "- 🛑 Deployment blocked for security reasons" >> $GITHUB_STEP_SUMMARY
          if [[ "$scan_result" != "success" ]]; then
            echo "- 📋 Code scan job did not complete successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "- 📋 Resolve ${critical_issues:-unknown} critical issues before proceeding" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Display scan results if available
          if [ -f "code-scan-results.json" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🚨 Critical Issues Found" >> $GITHUB_STEP_SUMMARY
            cat code-scan-results.json | jq -r '.findings[] | select(.severity == "CRITICAL") | "- **" + .description + "** (File: " + .file + ", Line: " + (.line | tostring) + ")"' >> $GITHUB_STEP_SUMMARY || true
          fi
          
          exit 1
        fi

  # Fifth job: Overall Security Gate (waits for both gates)
  overall-security-gate:
    name: 🛡️ Overall Security Gate
    runs-on: ubuntu-latest
    needs: [test-security-gate, code-security-gate]
    if: always()
    outputs:
      deployment-authorized: ${{ steps.gate.outputs.deployment-authorized }}
    
    steps:
    - name: Final Security Gate Decision
      id: gate
      run: |
        test_gate_result="${{ needs.test-security-gate.result }}"
        test_gate_passed="${{ needs.test-security-gate.outputs.gate-passed }}"
        code_gate_result="${{ needs.code-security-gate.result }}"
        code_gate_passed="${{ needs.code-security-gate.outputs.gate-passed }}"

        echo "## 🛡️ Overall Security Gate Decision" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Security Gate Status" >> $GITHUB_STEP_SUMMARY
        echo "| Gate | Status | Result |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Test Gate | ${test_gate_result} | ${test_gate_passed:-false} |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Security Gate | ${code_gate_result} | ${code_gate_passed:-false} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "$test_gate_passed" == "true" && "$code_gate_passed" == "true" ]]; then
          echo "✅ ALL SECURITY GATES PASSED"
          echo "🚀 DEPLOYMENT AUTHORIZED - All security requirements satisfied"
          echo "deployment-authorized=true" >> $GITHUB_OUTPUT
          
          echo "### 🟢 DEPLOYMENT AUTHORIZED ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🎉 All Security Requirements Satisfied:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Application functionality validated (tests passed)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No critical security vulnerabilities (SAST passed)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code meets security standards for deployment" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 **Ready to proceed with image build and deployment**" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ SECURITY GATES FAILED"
          echo "🛑 DEPLOYMENT BLOCKED - Security requirements not satisfied"
          echo "deployment-authorized=false" >> $GITHUB_OUTPUT
          
          echo "### 🔴 DEPLOYMENT BLOCKED ❌" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🛑 Security Requirements Not Met:**" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.test-security-gate.outputs.gate-passed }}" != "true" ]]; then
            echo "- ❌ Test gate failed - fix failing unit tests" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ needs.code-security-gate.outputs.gate-passed }}" != "true" ]]; then
            echo "- ❌ Code security gate failed - resolve critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- 📋 **Action Required:** Address all failing gates before deployment" >> $GITHUB_STEP_SUMMARY
          
          exit 1
        fi
