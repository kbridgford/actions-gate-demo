name: CI - Code Scanning and Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'

jobs:
  # First job: Run tests and basic checks
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    outputs:
      test-status: ${{ steps.tests.outcome }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Add supertest dependency for tests
      run: npm install --save-dev supertest

    - name: Run tests
      id: tests
      run: npm test

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: coverage/

  # Second job: SAST Code Scanning (runs in parallel with tests)
  code-scan:
    name: SAST Code Scanning
    runs-on: ubuntu-latest
    outputs:
      scan-status: ${{ steps.scan.outputs.scan-status }}
      issues-count: ${{ steps.scan.outputs.issues-count }}
      critical-issues: ${{ steps.scan.outputs.critical-issues }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Run SAST Code Scan
      id: scan
      run: |
        echo "Running SAST security scan..."
        node scripts/code-scan.js . code-scan-results.json

    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-scan-results
        path: code-scan-results.json

    - name: Comment PR with scan results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const results = JSON.parse(fs.readFileSync('code-scan-results.json', 'utf8'));
            const status = results.status === 'PASS' ? '✅ PASS' : '❌ FAIL';
            const emoji = results.status === 'PASS' ? '🔒' : '🚨';
            
            const body = `
          ## ${emoji} SAST Code Scan Results
          
          **Status:** ${status}
          **Total Issues:** ${results.summary.total}
          - Critical: ${results.summary.critical}
          - High: ${results.summary.high}
          - Medium: ${results.summary.medium}
          
          ${results.findings.length > 0 ? 
            '### Issues Found:\n' + results.findings.map(f => 
              `- **[${f.severity}]** ${f.description}\n  - File: \`${f.file}\` (line ${f.line})\n  - Evidence: \`${f.evidence}\``
            ).join('\n') : '🎉 No security issues found!'}
          `;
          
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          } catch (error) {
            console.log('Could not read scan results:', error.message);
          }

  # Third job: Security Gate Check (waits for both test and scan)
  security-gate:
    name: Security Gate Check
    runs-on: ubuntu-latest
    needs: [test, code-scan]
    outputs:
      gate-passed: ${{ steps.gate.outputs.gate-passed }}
    
    steps:
    - name: Evaluate Security Gate
      id: gate
      run: |
        echo "Evaluating security gate..."
        echo "Test Status: ${{ needs.test.outputs.test-status }}"
        echo "Code Scan Status: ${{ needs.code-scan.outputs.scan-status }}"
        echo "Critical Issues: ${{ needs.code-scan.outputs.critical-issues }}"
        
        # Gate logic: Tests must pass AND no critical/high severity issues
        if [[ "${{ needs.test.outputs.test-status }}" == "success" && "${{ needs.code-scan.outputs.scan-status }}" == "PASS" ]]; then
          echo "✅ Security gate PASSED - ready for deployment"
          echo "gate-passed=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Security gate FAILED - deployment blocked"
          echo "gate-passed=false" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Gate Status Summary
      if: always()
      run: |
        if [[ "${{ steps.gate.outputs.gate-passed }}" == "true" ]]; then
          echo "🟢 SECURITY GATE: PASSED"
          echo "✅ Tests passed"
          echo "✅ No critical security issues found"
          echo "🚀 Ready for deployment"
        else
          echo "🔴 SECURITY GATE: FAILED"
          echo "❌ Deployment blocked due to security concerns"
          if [[ "${{ needs.test.outputs.test-status }}" != "success" ]]; then
            echo "  - Tests failed"
          fi
          if [[ "${{ needs.code-scan.outputs.scan-status }}" != "PASS" ]]; then
            echo "  - Code scan found critical/high severity issues"
          fi
        fi