name: CI - Code Scanning and Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'

jobs:
  # First job: Run tests and basic checks
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    outputs:
      test-status: ${{ steps.tests.outcome }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Add supertest dependency for tests
      run: npm install --save-dev supertest

    - name: Run tests
      id: tests
      run: npm test

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: coverage/

  # Second job: SAST Code Scanning (runs in parallel with tests)
  code-scan:
    name: SAST Code Scanning
    runs-on: ubuntu-latest
    outputs:
      scan-status: ${{ steps.scan.outputs.scan-status }}
      issues-count: ${{ steps.scan.outputs.issues-count }}
      critical-issues: ${{ steps.scan.outputs.critical-issues }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Run SAST Code Scan
      id: scan
      run: |
        echo "Running SAST security scan..."
        node scripts/code-scan.js . code-scan-results.json

    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-scan-results
        path: code-scan-results.json

    - name: Comment PR with scan results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const results = JSON.parse(fs.readFileSync('code-scan-results.json', 'utf8'));
            const status = results.status === 'PASS' ? '✅ PASS' : '❌ FAIL';
            const emoji = results.status === 'PASS' ? '🔒' : '🚨';
            
            const body = `
          ## ${emoji} SAST Code Scan Results
          
          **Status:** ${status}
          **Total Issues:** ${results.summary.total}
          - Critical: ${results.summary.critical}
          - High: ${results.summary.high}
          - Medium: ${results.summary.medium}
          
          ${results.findings.length > 0 ? 
            '### Issues Found:\n' + results.findings.map(f => 
              `- **[${f.severity}]** ${f.description}\n  - File: \`${f.file}\` (line ${f.line})\n  - Evidence: \`${f.evidence}\``
            ).join('\n') : '🎉 No security issues found!'}
          `;
          
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          } catch (error) {
            console.log('Could not read scan results:', error.message);
          }

  # Third job: Security Gate Check (waits for both test and scan)
  security-gate:
    name: 🔒 Security Gate Evaluation
    runs-on: ubuntu-latest
    needs: [test, code-scan]
    outputs:
      gate-passed: ${{ steps.gate.outputs.gate-passed }}
    
    steps:
    - name: 📋 Gather Security Gate Inputs
      run: |
        echo "## 🔒 Security Gate Evaluation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Input Status" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
        echo "| Tests | ${{ needs.test.outputs.test-status }} | Unit tests execution |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Scan | ${{ needs.code-scan.outputs.scan-status }} | SAST security scanning |" >> $GITHUB_STEP_SUMMARY
        echo "| Critical Issues | ${{ needs.code-scan.outputs.critical-issues }} | High-risk vulnerabilities |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: 🚦 SECURITY GATE: Test Results Check
      run: |
        if [[ "${{ needs.test.outputs.test-status }}" == "success" ]]; then
          echo "✅ TEST GATE PASSED - All unit tests successful"
          echo "### ✅ Test Gate: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "All unit tests executed successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ TEST GATE FAILED - Unit tests failed"
          echo "### ❌ Test Gate: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "Unit tests failed - deployment blocked" >> $GITHUB_STEP_SUMMARY
        fi

    - name: 🔍 SECURITY GATE: Code Scanning Check
      run: |
        if [[ "${{ needs.code-scan.outputs.scan-status }}" == "PASS" ]]; then
          echo "✅ CODE SCAN GATE PASSED - No critical security issues"
          echo "### ✅ Code Scan Gate: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "SAST scanning found no critical or high-severity security issues" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ CODE SCAN GATE FAILED - Critical security issues found"
          echo "### ❌ Code Scan Gate: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "SAST scanning found ${{ needs.code-scan.outputs.critical-issues }} critical issues - deployment blocked" >> $GITHUB_STEP_SUMMARY
        fi

    - name: 🛡️ OVERALL SECURITY GATE DECISION
      id: gate
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🛡️ Final Security Gate Decision" >> $GITHUB_STEP_SUMMARY
        
        # Gate logic: Tests must pass AND no critical/high severity issues
        if [[ "${{ needs.test.outputs.test-status }}" == "success" && "${{ needs.code-scan.outputs.scan-status }}" == "PASS" ]]; then
          echo "✅ OVERALL SECURITY GATE: PASSED"
          echo "🚀 All security requirements satisfied - DEPLOYMENT AUTHORIZED"
          echo "gate-passed=true" >> $GITHUB_OUTPUT
          
          echo "### 🟢 SECURITY GATE: PASSED ✅" >> $GITHUB_STEP_SUMMARY
          echo "🚀 **DEPLOYMENT AUTHORIZED**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Requirements Satisfied:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No critical security vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code meets security standards for deployment" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ OVERALL SECURITY GATE: FAILED"
          echo "🛑 Security requirements not met - DEPLOYMENT BLOCKED"
          echo "gate-passed=false" >> $GITHUB_OUTPUT
          
          echo "### 🔴 SECURITY GATE: FAILED ❌" >> $GITHUB_STEP_SUMMARY
          echo "🛑 **DEPLOYMENT BLOCKED**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Issues Found:**" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.test.outputs.test-status }}" != "success" ]]; then
            echo "- ❌ Unit tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ needs.code-scan.outputs.scan-status }}" != "PASS" ]]; then
            echo "- ❌ Critical security vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
            echo "- 🚨 ${{ needs.code-scan.outputs.critical-issues }} critical issues must be resolved" >> $GITHUB_STEP_SUMMARY
          fi
          
          exit 1
        fi